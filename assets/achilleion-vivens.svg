Descrizione prodotto
Il nostro negozio vende cassetta pignoni 8v / 9v / 10v / 11v, che potete scegliere nel negozio.
8/9/10/11 cassette
cassette
Ampia gamma di applicazioni, molte scelte di velocità del dente
Caratteristiche：


Compatibile con SRAM, Sunrace, Shimano, ultegra, xt (verificare le specifiche per la capacità di avvolgimento della catena)
Il coperchio della serratura è realizzato in lega di alluminio 7075 per evitare graffi e usura, mentre il volano è lavorato con tornitura CNC per renderlo più leggero e allo stesso tempo più resistente.
La superficie del volano è nichelata, il che rende la superficie del volano argentea e bella, e ha un'elevata resistenza alla corrosione per aumentare la durata di servizio.
I denti del volano sono realizzati in acciaio ad alta resistenza, che riduce il peso e la resistenza all'usura pur mantenendo la robustezza, consentendo di guidare con maggiore tranquillità.
Forma del dente angolare tagliato in modo irregolare, meglio compatibile con varie marche di catene di ingranaggi, cambio sensibile e scorrevole.
