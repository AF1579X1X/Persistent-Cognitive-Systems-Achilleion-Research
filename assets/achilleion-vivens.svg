<svg width="1400" height="3400" viewBox="0 0 1400 3400" xmlns="http://www.w3.org/2000/svg">
  <rect width="1400" height="3400" fill="#ffffff"/>

  <style>
    .title { font: 800 62px Arial, sans-serif; fill:#111827; }
    .subtitle { font: 500 34px Arial, sans-serif; fill:#1f2937; }
    .box-title { font: 800 42px Arial, sans-serif; fill:#111827; }
    .box-sub { font: 700 31px Arial, sans-serif; fill:#1f2937; }
    .text { font: 500 30px Arial, sans-serif; fill:#111827; }
    .small { font: 500 28px Arial, sans-serif; fill:#374151; }
    .label { font: 800 27px Arial, sans-serif; fill:#111827; }
    .arrow { stroke:#475569; stroke-width:7; fill:none; marker-end:url(#arrow); }
    .branch { stroke:#475569; stroke-width:5; fill:none; marker-end:url(#arrow); }
  </style>

  <defs>
    <marker id="arrow" markerWidth="24" markerHeight="24" refX="20" refY="7" orient="auto">
      <path d="M0,0 L20,7 L0,14 Z" fill="#475569"/>
    </marker>
  </defs>

  <text x="700" y="100" text-anchor="middle" class="title">ACHILLEION VIVENS</text>
  <text x="700" y="160" text-anchor="middle" class="subtitle">Sistemi Cognitivi Persistenti · Persistent Cognitive Systems</text>
  <text x="700" y="210" text-anchor="middle" class="subtitle">Architetture Riflettenti · Reflective Architectures</text>

  <rect x="120" y="310" width="1160" height="370" rx="28" fill="#f8fafd" stroke="#2a7b7b" stroke-width="6"/>
  <text x="700" y="385" text-anchor="middle" class="box-title">Q_ANIMA</text>
  <text x="700" y="440" text-anchor="middle" class="box-sub">Motore operativo · Operational Engine</text>
  <text x="190" y="520" class="text">• Memoria persistente e stato</text>
  <text x="230" y="565" class="small">Persistent memory and state</text>
  <text x="190" y="625" class="text">• Livelli ombra / carta / live controllato</text>
  <text x="230" y="670" class="small">Shadow / paper / gated-live layers</text>

  <path d="M700 680 L700 805" class="arrow"/>

  <rect x="120" y="820" width="1160" height="420" rx="28" fill="#fafdff" stroke="#5c51a4" stroke-width="6"/>
  <text x="700" y="900" text-anchor="middle" class="box-title">MCP-Ω</text>
  <text x="700" y="955" text-anchor="middle" class="box-sub">Organo deliberativo · Deliberative Organ</text>
  <text x="190" y="1035" class="text">• Pressione e sovrastima</text>
  <text x="230" y="1080" class="small">Pressure and overconfidence</text>
  <text x="190" y="1140" class="text">• Provenienza e fiducia decisionale</text>
  <text x="230" y="1185" class="small">Provenance and trust-for-decision</text>

  <path d="M700 1240 L700 1390" class="arrow"/>
  <text x="735" y="1340" class="label">solo osservazione · observe-only</text>

  <rect x="170" y="1410" width="1060" height="220" rx="26" fill="#ffffff" stroke="#b0c4de" stroke-width="5"/>
  <text x="700" y="1490" text-anchor="middle" class="box-title">Traccia / esperienza</text>
  <text x="700" y="1545" text-anchor="middle" class="box-sub">Trace / experience</text>
  <text x="700" y="1595" text-anchor="middle" class="small">stato di campo · field state · sessione</text>

  <path d="M700 1630 L700 1775" class="arrow"/>

  <rect x="170" y="1790" width="1060" height="390" rx="26" fill="#ffffff" stroke="#708090" stroke-width="5"/>
  <text x="700" y="1870" text-anchor="middle" class="box-title">NCO</text>
  <text x="700" y="1925" text-anchor="middle" class="box-sub">Nodo di Continuità Operativa</text>
  <text x="700" y="1975" text-anchor="middle" class="small">Node of Operational Continuity</text>
  <text x="700" y="2045" text-anchor="middle" class="small">quando metabolizzato diventa · when metabolized becomes</text>
  <text x="700" y="2110" text-anchor="middle" class="box-sub">Nodo Cognitivo Organizzato</text>
  <text x="700" y="2165" text-anchor="middle" class="small">Organized Cognitive Node</text>

  <path d="M700 2180 L700 2355" class="arrow"/>

  <rect x="170" y="2370" width="1060" height="180" rx="26" fill="#fffdf6" stroke="#b8860b" stroke-width="6"/>
  <text x="700" y="2450" text-anchor="middle" class="box-title">SOGLIA TETA</text>
  <text x="700" y="2510" text-anchor="middle" class="box-sub">Condizione di verità · Truth-condition</text>

  <path d="M700 2550 L430 2740" class="branch"/>
  <path d="M700 2550 L970 2740" class="branch"/>

  <text x="360" y="2670" text-anchor="middle" class="label">portata · carried</text>
  <text x="1040" y="2670" text-anchor="middle" class="label">subìta · undergone</text>

  <rect x="90" y="2760" width="560" height="320" rx="28" fill="#f6fff8" stroke="#2e8b57" stroke-width="6"/>
  <text x="370" y="2855" text-anchor="middle" class="box-title">Memoria Costitutiva</text>
  <text x="370" y="2915" text-anchor="middle" class="box-sub">Constitutive Memory</text>
  <text x="370" y="2995" text-anchor="middle" class="small">portata · carried</text>
  <text x="370" y="3050" text-anchor="middle" class="small">contestabile · contestable</text>

  <rect x="750" y="2760" width="560" height="320" rx="28" fill="#fff5f5" stroke="#cd5c5c" stroke-width="6"/>
  <text x="1030" y="2855" text-anchor="middle" class="box-title">Quarantena e Revisione</text>
  <text x="1030" y="2915" text-anchor="middle" class="box-sub">Quarantine and Review</text>
  <text x="1030" y="2995" text-anchor="middle" class="small">subìta · undergone</text>
  <text x="1030" y="3050" text-anchor="middle" class="small">mai silente · never silent</text>
</svg>
